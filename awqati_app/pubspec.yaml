name: awqati_app
description: Awqati - Islamic Smart Display Application

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^17.2.3

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2

  # Prayer Times
  adhan: ^2.0.0+1

  # Audio
  just_audio: ^0.10.5
  just_audio_background: ^0.0.1-beta.11
  audio_service: ^0.18.13

  # Location
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  permission_handler: ^12.0.3

  # HTTP
  http: ^1.2.1
  dio: ^5.4.2+1

  # Utilities
  intl: any
  shared_preferences: ^2.2.3
  connectivity_plus: ^7.1.1
  package_info_plus: ^9.0.1

  # UI
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  google_fonts: ^8.1.0
  auto_size_text: ^3.0.0
  flutter_animate: ^4.5.0
  smooth_page_indicator: ^2.0.1

  # Islamic dates
  hijri: ^3.0.1

  # TV focus
  focusable_control_builder: ^1.2.0
  
  # Background tasks
  workmanager: ^0.9.0+3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1
  riverpod_generator: ^2.3.12
  json_serializable: ^6.7.1
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
    - assets/quran/
    - assets/fonts/
    - assets/icon/  

  fonts:
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
        - asset: assets/fonts/Amiri-Bold.ttf
          weight: 700
    - family: ScheherazadeNew
      fonts:
        - asset: assets/fonts/ScheherazadeNew-Regular.ttf
        - asset: assets/fonts/ScheherazadeNew-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"  # path to your image
  adaptive_icon_background: "#0A0E1A"  # your deepNight color
  adaptive_icon_foreground: "assets/icon/icon.png"
